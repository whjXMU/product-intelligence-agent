services:
  postgres:
    image: postgres:16-alpine
    container_name: product-intelligence-agent-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
